name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (keeps queue short on rapid pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast lint gate (runs first; cheap) ──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: python -m pip install "ruff>=0.6"
      - name: Check synchronized versions
        run: python tools/version.py check
      - name: ruff check
        run: ruff check .
      # Rust core workspace lint (rust/): format + clippy as hard gates.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: cargo fmt
        working-directory: rust
        run: cargo fmt --check
      - name: cargo clippy
        working-directory: rust
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Test matrix ──
  # Licensed-PDK and external-ngspice oracle tests self-skip when their local
  # model files or simulator are absent.
  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    # The Windows row is PROVISIONAL: it is the first enablement of the MSVC
    # build of the vendored Berkeley BSIM4.5 C (via the out-of-vendor config
    # shim wired up in rust/crates/co-bsim4/build.rs). It cannot be validated
    # off a Windows runner, so it runs continue-on-error until a green run
    # confirms it — a red Windows leg must not block the ubuntu/macOS gates.
    # Promote it to a hard gate by deleting `experimental: true` from the row.
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
          # win_amd64 / MSVC ABI. abi3-py310 → one Python is enough, aligned
          # with the macOS row.
          - os: windows-latest
            python-version: "3.12"
            experimental: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      # The compiled Rust core (distribution `circuitopt-core`, import name
      # circuitopt_core) is the sole compute engine as of v2.0.0 and is NOT
      # published to PyPI, while the main package pins it EXACTLY
      # (`circuitopt-core==<version>` in pyproject). It must therefore be built
      # and installed from the local workspace BEFORE `pip install -e .`, else
      # the editable install cannot resolve the pin off the index. Installing it
      # first also exercises tests/test_engine.py's rust-present branch (which
      # asserts engine_info()["core"] is not None).
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      # bindgen needs libclang to parse the vendored ngspice headers. The
      # windows-latest image ships LLVM under C:\Program Files\LLVM; the choco
      # step is a fast no-op if it is already present (belt-and-suspenders across
      # image revisions) and clang-sys is pointed at it via LIBCLANG_PATH.
      # PYTHONUTF8/PYTHONIOENCODING neutralise the cp1252 default so any UTF-8
      # fixture or subprocess output decodes identically to POSIX.
      - name: Set up libclang (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm --no-progress -y
      - name: Configure Windows environment
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> "$GITHUB_ENV"
          echo "PYTHONUTF8=1" >> "$GITHUB_ENV"
          echo "PYTHONIOENCODING=utf-8" >> "$GITHUB_ENV"
      - name: Install circuitopt_core (compiled rust engine)
        run: python -m pip install rust/crates/co-py
      - name: Install package (with test extras)
        run: python -m pip install -e ".[test]"
      - name: Run tests
        run: python -m pytest -q

  # ── Byte-gate: Cadence-calibration reproduction gate ──
  # circuitopt.calibration --all exits 1 on any drift, so it doubles as a hard gate.
  # Single-platform by design: the compiled core is deterministic and the
  # calibration numbers are platform-independent, so one runner proves the
  # reproduction. Windows adds no coverage here (its MSVC build path is already
  # exercised by the provisional Windows row of the `test` job) and would only
  # add an unverified leg to a bit-exact gate, so byte-gate stays ubuntu-only.
  byte-gate:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # calibration --all runs real solves on the compiled Rust core, so the
      # `circuitopt-core` engine must be built and installed from the local
      # workspace first — it is unpublished and pinned exactly, and v2.0.0 has
      # no Python/numba fallback (see the test job for the full rationale).
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Install circuitopt_core (compiled rust engine)
        run: python -m pip install rust/crates/co-py
      - name: Install package (with test extras)
        run: python -m pip install -e ".[test]"
      - name: Calibration byte-gate
        env:
          RUN_SLOW_CHOPPER: "1"
        run: python -m circuitopt.calibration --all
