name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (keeps queue short on rapid pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast lint gate (runs first; cheap) ──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: python -m pip install "ruff>=0.6"
      - name: Check synchronized versions
        run: python tools/version.py check
      - name: ruff check
        run: ruff check .
      # Rust core workspace lint (rust/): format + clippy as hard gates.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: cargo fmt
        working-directory: rust
        run: cargo fmt --check
      - name: cargo clippy
        working-directory: rust
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Test matrix ──
  # Licensed-PDK and external-ngspice oracle tests self-skip when their local
  # model files or simulator are absent.
  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package (with test extras)
        run: python -m pip install -e ".[test]"
      # Build + install the Rust core so tests/test_engine.py's rust-present
      # branch is exercised here (locally it probe-skips when not installed).
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Install circuitopt_core (compiled rust engine)
        run: python -m pip install rust/crates/co-py
      - name: Run tests
        run: python -m pytest -q

  # ── Byte-gate: Cadence-calibration reproduction gate ──
  # circuitopt.calibration --all exits 1 on any drift, so it doubles as a hard gate.
  byte-gate:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package (with test extras)
        run: python -m pip install -e ".[test]"
      - name: Calibration byte-gate
        env:
          RUN_SLOW_CHOPPER: "1"
        run: python -m circuitopt.calibration --all
