name: Release

# Fires when a semantic-version tag is pushed (e.g. `git tag v1.2.0 && git push --tags`).
# Builds the sdist + wheel and attaches them to a GitHub Release for that tag.
on:
  push:
    tags:
      - "v*"

# Minimal token scope: creating a Release + uploading assets only needs write
# access to repository contents. Nothing else is granted.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag and project version
        run: python tools/version.py check --tag "$GITHUB_REF_NAME"

      - name: Install build backend
        run: python -m pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  # ── Rust core wheels (build + archive only; NOT attached to the Release) ─────
  # Builds the circuitopt_core (rust/crates/co-py) wheel per-OS and stores it as
  # a workflow artifact, so every tagged release proves the Rust workspace still
  # compiles and packages everywhere. Attaching these wheels to the GitHub
  # Release (and later PyPI) is deliberately deferred to R6, when the rust
  # engine is numerically wired in — until then the artifact upload below is the
  # end of the line, and the existing `release` job's behavior is unchanged.
  build-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install maturin
        run: python -m pip install "maturin>=1.14,<2.0"

      - name: Build circuitopt_core wheel
        run: maturin build --release -m rust/crates/co-py/Cargo.toml -o dist-wheels

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: circuitopt-core-wheels-${{ matrix.os }}
          path: dist-wheels/*.whl

  # ── PyPI publishing (intentionally NOT enabled yet) ──────────────────────────
  # The former blocker (generic `core` top-level import name) was resolved in
  # 0.2.0 by the rename to `circuitopt`. Remaining prerequisite: register the
  # project on PyPI and configure trusted publishing for this repo. Until then
  # this workflow ships build artifacts to GitHub Releases only, never to PyPI.
  #
  # To enable PyPI, add a job like the following (trusted publishing, no
  # long-lived token):
  #
  #   pypi:
  #     needs: release
  #     runs-on: ubuntu-latest
  #     permissions:
  #       id-token: write        # OIDC for PyPI trusted publishing
  #     steps:
  #       - uses: actions/checkout@v4
  #       - uses: actions/setup-python@v5
  #         with:
  #           python-version: "3.12"
  #       - run: python -m pip install build
  #       - run: python -m build
  #       - uses: pypa/gh-action-pypi-publish@release/v1
