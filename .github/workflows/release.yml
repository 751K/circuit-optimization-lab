name: Release

# Fires when a semantic-version tag is pushed (e.g. `git tag v1.2.0 && git push --tags`).
# Builds the sdist + wheel and attaches them to a GitHub Release for that tag.
on:
  push:
    tags:
      - "v*"

# Minimal token scope: creating a Release + uploading assets only needs write
# access to repository contents. Nothing else is granted.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  # ── PyPI publishing (intentionally NOT enabled yet) ──────────────────────────
  # The former blocker (generic `core` top-level import name) was resolved in
  # 0.2.0 by the rename to `circuitopt`. Remaining prerequisite: register the
  # project on PyPI and configure trusted publishing for this repo. Until then
  # this workflow ships build artifacts to GitHub Releases only, never to PyPI.
  #
  # To enable PyPI, add a job like the following (trusted publishing, no
  # long-lived token):
  #
  #   pypi:
  #     needs: release
  #     runs-on: ubuntu-latest
  #     permissions:
  #       id-token: write        # OIDC for PyPI trusted publishing
  #     steps:
  #       - uses: actions/checkout@v4
  #       - uses: actions/setup-python@v5
  #         with:
  #           python-version: "3.12"
  #       - run: python -m pip install build
  #       - run: python -m build
  #       - uses: pypa/gh-action-pypi-publish@release/v1
