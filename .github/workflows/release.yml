name: Release

# Fires when a semantic-version tag is pushed (e.g. `git tag v2.0.0 && git push --tags`).
# As of v2.0.0 CircuitOpt ships TWO distributions that must be released together:
#   * circuit-optimization   — the pure-Python orchestration package (sdist + wheel)
#   * circuitopt-core         — the compiled Rust core (per-OS wheels, import name
#                               circuitopt_core), which the main package pins exactly.
# Both are attached to the GitHub Release for the tag.
on:
  push:
    tags:
      - "v*"

# Minimal token scope: creating a Release + uploading assets only needs write
# access to repository contents. Nothing else is granted.
permissions:
  contents: write

jobs:
  # ── Rust core wheels (built first; attached to the Release below) ────────────
  # Builds the circuitopt_core (rust/crates/co-py) wheel per-OS and uploads it as
  # a workflow artifact. As of v2.0.0 these wheels are published on the GitHub
  # Release (the `release` job depends on this job and downloads them).
  build-wheels:
    runs-on: ${{ matrix.os }}
    # windows-latest (win_amd64, MSVC ABI) is PROVISIONAL: the first enablement
    # of the MSVC build of the vendored BSIM4.5 C, not validatable off a Windows
    # runner. It runs continue-on-error so a red Windows wheel can never block a
    # release — the release job (needs: build-wheels) still publishes the Linux
    # and macOS wheels, and picks the Windows wheel up too once it goes green.
    # Drop the continue-on-error expression to make it a required wheel.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      # bindgen needs libclang. The windows-latest image ships LLVM under
      # C:\Program Files\LLVM; choco is a fast no-op if already present, and
      # clang-sys is pointed at it via LIBCLANG_PATH.
      - name: Set up libclang (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm --no-progress -y

      - name: Point bindgen at libclang (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> "$GITHUB_ENV"

      - name: Install maturin
        run: python -m pip install "maturin>=1.14,<2.0"

      - name: Build circuitopt_core wheel
        run: maturin build --release -m rust/crates/co-py/Cargo.toml -o dist-wheels

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: circuitopt-core-wheels-${{ matrix.os }}
          path: dist-wheels/*.whl

  release:
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify tag and project version
        # Also checks the circuitopt-core== pin matches the tagged version (D9).
        run: python tools/version.py check --tag "$GITHUB_REF_NAME"

      - name: Install build backend
        run: python -m pip install build

      - name: Build sdist + wheel (circuit-optimization)
        run: python -m build

      - name: Download circuitopt_core wheels
        uses: actions/download-artifact@v4
        with:
          pattern: circuitopt-core-wheels-*
          path: core-wheels
          merge-multiple: true

      - name: Publish GitHub Release (both distributions)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            core-wheels/*.whl
          generate_release_notes: true

  # ── PyPI publishing (intentionally NOT enabled yet) ──────────────────────────
  # The former blocker (generic `core` top-level import name) was resolved in
  # 0.2.0 by the rename to `circuitopt`. Remaining prerequisite: register both
  # `circuit-optimization` and `circuitopt-core` on PyPI and configure trusted
  # publishing for this repo. Until then this workflow ships build artifacts to
  # GitHub Releases only, never to PyPI. Both distributions must be published
  # together (the main package pins circuitopt-core exactly).
  #
  # To enable PyPI, add jobs that build and `pypa/gh-action-pypi-publish` BOTH
  # the sdist/wheel and the per-OS circuitopt-core wheels (trusted publishing,
  # id-token: write, no long-lived token).
